name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: infra

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write   # required for OIDC login
      contents: read
      pull-requests: write

    env:
      ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC:        "true"
      # Terraform variables — avoids committing tfvars with secrets
      TF_VAR_environment:             "dev"
      TF_VAR_github_org:              ${{ secrets.GH_ORG }}
      TF_VAR_databricks_host:         ${{ secrets.DATABRICKS_HOST }}
      TF_VAR_databricks_token:        ${{ secrets.DATABRICKS_TOKEN }}
      TF_VAR_databricks_http_path:    ${{ secrets.DATABRICKS_HTTP_PATH }}
      TF_VAR_foundry_endpoint:        ${{ secrets.FOUNDRY_ENDPOINT }}
      TF_VAR_foundry_api_key:         ${{ secrets.FOUNDRY_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8').slice(0, 60000);
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.plan.outcome == 'success'
        run: terraform apply -auto-approve tfplan
