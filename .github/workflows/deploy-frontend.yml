name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Read outputs from Terraform state
        id: tf
        working-directory: infra
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC:        "true"
        run: |
          terraform init -input=false
          echo "api_base_url=https://$(terraform output -raw function_app_default_hostname)" >> "$GITHUB_OUTPUT"
          echo "aad_tenant_id=$(terraform output -raw aad_tenant_id)"              >> "$GITHUB_OUTPUT"
          echo "aad_frontend_client_id=$(terraform output -raw aad_frontend_client_id)" >> "$GITHUB_OUTPUT"
          echo "aad_backend_client_id=$(terraform output -raw aad_backend_client_id)"   >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL:          ${{ steps.tf.outputs.api_base_url }}
          VITE_AAD_TENANT_ID:         ${{ steps.tf.outputs.aad_tenant_id }}
          VITE_AAD_CLIENT_ID:         ${{ steps.tf.outputs.aad_frontend_client_id }}
          VITE_AAD_BACKEND_CLIENT_ID: ${{ steps.tf.outputs.aad_backend_client_id }}
        run: npm run build

      - name: Upload to Azure Blob Storage (static website)
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ secrets.STORAGE_ACCOUNT_NAME }} \
              --source frontend/dist \
              --destination '$web' \
              --overwrite true
