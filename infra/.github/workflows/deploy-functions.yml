name: Deploy Azure Functions

on:
  push:
    branches: [main]
    paths:
      - "src/DatabricksJobsFunction/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  AZURE_FUNCTIONAPP_PACKAGE_PATH: src/DatabricksJobsFunction

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Build
        run: |
          dotnet build ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} \
            --configuration Release \
            --no-restore

      - name: Publish
        run: |
          dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} \
            --configuration Release \
            --no-build \
            --output ./publish

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ./publish
          respect-funcignore: true
